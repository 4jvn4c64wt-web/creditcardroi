<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#78716c" stroke-width="0.5" opacity="0.04"/>
    </pattern>
    <clipPath id="card-clip">
      <rect x="0" y="0" width="1200" height="603" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#fafaf9"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- LEFT SIDE -->

  <!-- Headline -->
  <text x="60" y="80" font-family="'IBM Plex Sans', sans-serif" font-size="32" font-weight="700" fill="#1c1917">Know which cards</text>
  <text x="60" y="120" font-family="'IBM Plex Sans', sans-serif" font-size="32" font-weight="700" fill="#1c1917">are worth keeping</text>

  <!-- Subtitle -->
  <text x="60" y="155" font-family="'IBM Plex Sans', sans-serif" font-size="14" font-weight="400" fill="#78716c">See what you actually earn. Cut the cards that cost you.</text>

  <!-- Card Result Row 1: Chase Sapphire Reserve -->
  <rect x="60" y="185" width="460" height="56" rx="8" fill="#ffffff" stroke="#e7e5e4" stroke-width="0.5"/>
  <text x="80" y="210" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="600" fill="#1c1917">Chase Sapphire Reserve</text>
  <text x="80" y="228" font-family="'IBM Plex Sans', sans-serif" font-size="12" font-weight="400" fill="#78716c">net value</text>
  <text x="290" y="218" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="500" fill="#059669">+$847</text>
  <rect x="430" y="199" width="72" height="24" rx="12" fill="#f0fdf4"/>
  <text x="466" y="215" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="500" fill="#059669" text-anchor="middle">+52%</text>

  <!-- Card Result Row 2: Amex Gold -->
  <rect x="60" y="251" width="460" height="56" rx="8" fill="#ffffff" stroke="#e7e5e4" stroke-width="0.5"/>
  <text x="80" y="276" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="600" fill="#1c1917">Amex Gold</text>
  <text x="80" y="294" font-family="'IBM Plex Sans', sans-serif" font-size="12" font-weight="400" fill="#78716c">net value</text>
  <text x="290" y="284" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="500" fill="#059669">+$412</text>
  <rect x="430" y="265" width="72" height="24" rx="12" fill="#f0fdf4"/>
  <text x="466" y="281" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="500" fill="#059669" text-anchor="middle">+65%</text>

  <!-- Card Result Row 3: Capital One Venture X -->
  <rect x="60" y="317" width="460" height="56" rx="8" fill="#ffffff" stroke="#e7e5e4" stroke-width="0.5"/>
  <text x="80" y="342" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="600" fill="#1c1917">Capital One Venture X</text>
  <text x="80" y="360" font-family="'IBM Plex Sans', sans-serif" font-size="12" font-weight="400" fill="#78716c">net value</text>
  <text x="290" y="350" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="500" fill="#dc2626">-$83</text>
  <rect x="430" y="331" width="72" height="24" rx="12" fill="#fef2f2"/>
  <text x="466" y="347" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="500" fill="#dc2626" text-anchor="middle">-21%</text>

  <!-- RIGHT SIDE: Credit card stack -->

  <!-- Back card (6deg rotation) -->
  <g transform="translate(820, 120) rotate(6, 160, 120)">
    <rect width="320" height="200" rx="16" fill="#292524"/>
  </g>

  <!-- Middle card (3deg rotation) -->
  <g transform="translate(810, 140) rotate(3, 160, 120)">
    <rect width="320" height="200" rx="16" fill="#44403c"/>
  </g>

  <!-- Front card (straight) -->
  <g transform="translate(800, 160)">
    <rect width="320" height="200" rx="16" fill="#1c1917"/>

    <!-- Gold chip -->
    <rect x="30" y="50" width="40" height="30" rx="4" fill="#d4a843"/>
    <line x1="50" y1="50" x2="50" y2="80" stroke="#b8922e" stroke-width="0.5"/>
    <line x1="30" y1="65" x2="70" y2="65" stroke="#b8922e" stroke-width="0.5"/>

    <!-- Card number -->
    <text x="30" y="115" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="400" fill="#a8a29e" letter-spacing="1">4242 •••• •••• 7890</text>

    <!-- Annual fee label -->
    <text x="30" y="150" font-family="'IBM Plex Sans', sans-serif" font-size="9" font-weight="400" fill="#78716c" letter-spacing="1">ANNUAL FEE</text>
    <text x="30" y="165" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#a8a29e">$550</text>

    <!-- Net value label -->
    <text x="200" y="150" font-family="'IBM Plex Sans', sans-serif" font-size="9" font-weight="400" fill="#78716c" letter-spacing="1">NET VALUE</text>
    <text x="200" y="165" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#34d399">+$847</text>
  </g>

  <!-- Bottom strip -->
  <rect x="0" y="603" width="1200" height="27" fill="#1c1917"/>
  <text x="60" y="621" font-family="'IBM Plex Sans', sans-serif" font-size="12" font-weight="600" fill="#ffffff">creditcardvaluetracker.com</text>
  <text x="1140" y="621" font-family="'IBM Plex Sans', sans-serif" font-size="11" font-weight="400" fill="#78716c" text-anchor="end">Privacy-first. Runs in your browser.</text>
</svg>
